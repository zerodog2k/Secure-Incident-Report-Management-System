{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <h2 class="fw-bold mb-1">Create account</h2>
        <p class="text-secondary mb-4">Create your account to report and track incidents.</p>

        <form method="post" action="{{ url_for('register_post') }}" class="needs-validation" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Full name</label>
            <input type="text" name="full_name" class="form-control" placeholder="e.g. Manish Shahi" required>
            <div class="invalid-feedback">Please enter your full name.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>

          <div class="mb-2">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" minlength="8" placeholder="Minimum 8 characters" required>
            <div class="invalid-feedback">Password must be at least 8 characters.</div>
          </div>

          <div class="text-secondary small mb-4">
            Minimum 8 characters.
          </div>

          <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
            Create account
          </button>
        </form>

        <div class="text-center mt-4">
          <span class="text-secondary">Already have an account?</span>
          <a class="fw-semibold text-decoration-none" href="{{ url_for('login') }}">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (() => {
    const forms = document.querySelectorAll('.needs-validation');
    Array.from(forms).forEach(form => {
      form.addEventListener('submit', event => {
        if (!form.checkValidity()) {
          event.preventDefault();
          event.stopPropagation();
        }
        form.classList.add('was-validated');
      }, false);
    });
  })();
</script>
{% endblock %}
